name: Build, Push & Deploy Backend Ventas Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'back-Ventas_SpringBoot/**'
      - '.github/workflows/ventas.yml'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          file: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REPO_URL_BACKEND }}:latest
            ${{ secrets.ECR_REPO_URL_BACKEND }}:${{ github.sha }}

      - name: Deploy automático en EC2 Backend
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_BACKEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Backend Ventas" \
            --parameters 'commands=[
              "docker stop backend-ventas || true",
              "docker rm backend-ventas || true",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_BACKEND }}:latest",
              "docker run -d --name backend-ventas --restart always -p 8080:8080 ${{ secrets.ECR_REPO_URL_BACKEND }}:latest"
            ]' \
            --region us-east-1